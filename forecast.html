<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forecast — SkyCast Weather</title>
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("skycast_theme") || "light");</script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="forecast">

  <nav class="navbar">
    <a href="index.html" class="logo">☁ SkyCast <span>Pro</span></a>
    <button id="navToggle" class="nav-toggle" type="button" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link" data-page="home">Home</a></li>
      <li><a href="forecast.html" class="nav-link" data-page="forecast">Forecast</a></li>
      <li><a href="favorites.html" class="nav-link" data-page="favorites">Favorites</a></li>
      <li><a href="about.html" class="nav-link" data-page="about">About</a></li>
    </ul>
    <div class="search-box">
      <button id="themeToggleBtn" class="theme-btn" type="button" aria-label="Toggle theme"></button>
      <button id="unitToggleBtn" class="unit-btn" type="button">°F</button>
      <input type="text" id="cityInput" placeholder="Search city...">
      <button id="searchBtn" type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button id="locationBtn" type="button"><i class="fa-solid fa-location-dot"></i></button>
    </div>
  </nav>

  <main class="page-wrap">
    <header class="page-header">
      <h1 id="forecastCity">Forecast</h1>
      <p id="forecastDate" class="muted">—</p>
    </header>

    <section class="chart-section card-block">
      <div class="chart-header">
        <h2><i class="fa-solid fa-chart-area"></i> Temperature graph</h2>
        <p class="muted">Next 24 hours</p>
      </div>
      <div class="chart-wrap">
        <canvas id="forecastChart"></canvas>
      </div>
    </section>

    <section class="forecast-section full-width">
      <div class="forecast-tabs">
        <button class="tab-btn active" id="hourlyTab" type="button">Hourly</button>
        <button class="tab-btn" id="dailyTab" type="button">5-Day</button>
      </div>

      <div id="hourlyPanel" class="forecast-panel">
        <p class="panel-subtitle">Next 24 hours · top to bottom</p>
        <div class="hourly-container hourly-24" id="hourlyContainer"></div>
      </div>

      <div id="dailyPanel" class="forecast-panel" hidden>
        <div class="daily-box" id="dailyContainer"></div>
      </div>
    </section>

    <section class="ai-section">
      <h2>🧠 Smart recommendations</h2>
      <div class="ai-grid" id="aiSuggestionsGrid"></div>
    </section>

    <section class="innovative-health-section page-health">
      <div class="ai-card" id="healthRiskCard">
        <h3>🎯 Heat-Health Vulnerability Index</h3>
        <p id="hhviMetrics">Loading...</p>
        <div class="meter-container"><div id="riskMeterBar"></div></div>
        <p id="healthAdvice">—</p>
      </div>
    </section>
  </main>

  <footer class="app-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/common.js"></script>
  <script src="js/forecast-page.js"></script>
</body>
</html>
